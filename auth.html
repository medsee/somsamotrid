<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kirish | Somsa.uz Motrid</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <header class="header" id="header">
    <nav class="nav container">
      <a href="index.html" class="nav__logo"><div class="logo-icon">🥟</div><div class="logo-text"><span>Somsa</span><strong>.uz</strong> Motrid</div></a>
      <ul class="nav__menu" id="navMenu">
        <li><a href="index.html" class="nav__link">Bosh sahifa</a></li>
        <li><a href="menu.html" class="nav__link">Menyu</a></li>
        <li><a href="order.html" class="nav__link">Buyurtma</a></li>
      </ul>
      <div class="nav__actions">
        <a href="order.html" class="nav__cart"><i class="fas fa-shopping-basket"></i><span class="cart-badge" id="cartBadge">0</span></a>
        <button class="nav__toggle" id="navToggle"><span></span><span></span><span></span></button>
      </div>
    </nav>
  </header>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon" style="margin:0 auto .5rem;width:52px;height:52px;font-size:2rem">🥟</div>
        <h1>Somsa.uz Motrid</h1>
        <p>Shaxsiy kabinetingiz</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')"><i class="fas fa-sign-in-alt"></i> Kirish</button>
        <button class="auth-tab" id="tabRegister" onclick="switchTab('register')"><i class="fas fa-user-plus"></i> Ro'yxat</button>
      </div>
      <!-- LOGIN -->
      <div class="auth-form active" id="formLogin">
        <div class="form-group"><label class="form-label">Telefon yoki Email</label><div class="input-icon-wrap"><i class="fas fa-user"></i><input type="text" id="loginIdentifier" class="form-input" placeholder="+998 97 921 37 22"/></div></div>
        <div class="form-group"><label class="form-label">Parol</label><div class="pwd-wrap input-icon-wrap"><i class="fas fa-lock"></i><input type="password" id="loginPassword" class="form-input" placeholder="••••••••"/><button type="button" class="pwd-toggle-btn" onclick="togglePwd('loginPassword',this)"><i class="fas fa-eye"></i></button></div><div style="text-align:right;margin-top:.4rem"><a href="#" style="font-size:.8rem;color:var(--purple-light)" onclick="showForgot()">Parolni unutdingizmi?</a></div></div>
        <button class="btn btn--primary btn--full" id="loginBtn" onclick="handleLogin()"><i class="fas fa-sign-in-alt"></i> Kirish</button>
        <div class="auth-divider">yoki</div>
        <div class="social-auth">
          <button class="social-auth-btn" onclick="showToast('Tez orada!','info')"><i class="fab fa-google" style="color:#EA4335"></i> Google</button>
          <button class="social-auth-btn" onclick="showToast('Tez orada!','info')"><i class="fab fa-telegram" style="color:#0088cc"></i> Telegram</button>
        </div>
      </div>
      <!-- REGISTER -->
      <div class="auth-form" id="formRegister">
        <div class="bonus-hint"><i class="fas fa-gift"></i><span>Ro'yxatdan o'tganingizda <strong style="color:var(--purple-light)">100 bonus ball</strong> sovg'a!</span></div>
        <div class="form-group"><label class="form-label">Ismingiz *</label><div class="input-icon-wrap"><i class="fas fa-user"></i><input type="text" id="regName" class="form-input" placeholder="Ism Familiya"/></div></div>
        <div class="form-group"><label class="form-label">Telefon *</label><div class="input-icon-wrap"><i class="fas fa-phone"></i><input type="tel" id="regPhone" class="form-input" placeholder="+998 97 921 37 22"/></div></div>
        <div class="form-group"><label class="form-label">Email (ixtiyoriy)</label><div class="input-icon-wrap"><i class="fas fa-envelope"></i><input type="email" id="regEmail" class="form-input" placeholder="email@example.com"/></div></div>
        <div class="form-group"><label class="form-label">Parol *</label><div class="pwd-wrap input-icon-wrap"><i class="fas fa-lock"></i><input type="password" id="regPassword" class="form-input" placeholder="Kamida 8 belgi" oninput="checkPwdStrength(this.value)"/><button type="button" class="pwd-toggle-btn" onclick="togglePwd('regPassword',this)"><i class="fas fa-eye"></i></button></div><div class="pwd-strength"><div class="pwd-strength-bar" id="ps1"></div><div class="pwd-strength-bar" id="ps2"></div><div class="pwd-strength-bar" id="ps3"></div><div class="pwd-strength-bar" id="ps4"></div></div><div class="pwd-strength-label" id="pwdStrengthLabel"></div></div>
        <div class="form-group"><label class="form-label">Parolni tasdiqlash *</label><div class="pwd-wrap input-icon-wrap"><i class="fas fa-lock"></i><input type="password" id="regPasswordConfirm" class="form-input" placeholder="Parolni qaytaring"/></div></div>
        <div class="form-check" style="margin-bottom:1.25rem"><input type="checkbox" id="agreeTerms"/><label for="agreeTerms"><a href="#" style="color:var(--purple-light)">Shartlar</a>ga roziman</label></div>
        <button class="btn btn--primary btn--full" id="registerBtn" onclick="handleRegister()"><i class="fas fa-user-plus"></i> Ro'yxatdan o'tish</button>
      </div>
    </div>
  </div>
  <!-- Forgot Modal -->
  <div class="modal-overlay hidden" id="forgotModal">
    <div class="modal">
      <div class="modal__icon">🔐</div>
      <h2 class="modal__title">Parolni tiklash</h2>
      <p class="modal__text" style="margin-bottom:1rem">Telefon raqamingizni kiriting</p>
      <div class="form-group"><input type="tel" id="forgotPhone" class="form-input" placeholder="+998 97 921 37 22"/></div>
      <div style="display:flex;gap:.75rem;margin-top:1rem">
        <button class="btn btn--primary" style="flex:1" onclick="handleForgot()">SMS yuborish</button>
        <button class="btn btn--outline" style="flex:1" onclick="document.getElementById('forgotModal').classList.add('hidden')">Bekor</button>
      </div>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="app.js"></script>
</body>
</html>
